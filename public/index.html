<script>

  const correoManual = document.getElementById('correoManual');
  const passwordInput = document.getElementById('passwordManual');
  const passwordContainer = document.getElementById('passwordManualContainer');
  const advertencia = document.getElementById('googleAuthAdvertencia');
  const botonIngresar = document.getElementById('botonIngresar');
  const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  //let correoValido = false;
  //let requierePassword = false;

  console.log(`Very Beginning Current State: ${JSON.stringify({passwordManual: passwordInput.disabled, googleAuthAdvertencia: advertencia.style.display, botonIngresar: botonIngresar.disabled})}`);

  function validarYEnviar() {
      const correo = correoManual.value.trim();
      /*const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      const passwordInput = document.getElementById("passwordManual");
      const advertencia = document.getElementById("googleAuthAdvertencia");
      const botonIngresar = document.getElementById("botonIngresar");*/

      console.log('Starting validarYEnviar()...');
      console.log(`Current State: ${JSON.stringify({passwordManual: passwordInput.disabled, googleAuthAdvertencia: advertencia.style.display, botonIngresar: botonIngresar.disabled})}`);

      // Asegura que el correo no tenga texto adicional después
      if (regex.test(correo) && correo === correo.match(regex)[0]) {
        fetch(`/api/manualUser?email=${encodeURIComponent(correo)}`)
          .then(res => {
            if (!res.ok) throw new Error("Usuario no encontrado");
            return res.json();
          })
          .then(data => {
            console.log("Usuario encontrado:", data);
            const esGmail = correo.toLowerCase().endsWith("@gmail.com");
            const usaGoogleAuth = data.googleId || esGmail;

            if (usaGoogleAuth) {
              advertencia.style.display = "block";
              passwordInput.disabled = true;
              botonIngresar.disabled = true;
              botonIngresar.classList.remove('enabled');
            } else {
              const password = passwordInput.value.trim();
              fetch('/api/verificarPassword', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: correo, password })
              })
              .then(res => res.json())
              .then(result => {
                if (result.status === 'ok') {
                  formulario.submit(); // solo si la contraseña es válida
                } else {
                  alert("Contraseña incorrecta.");
                }
              }).catch(err => {
                if (err.bloqueadoHasta) {
                  mostrarTiempoBloqueo(err.bloqueadoHasta);
                } else {
                  alert("Error al verificar contraseña");
                }
              });

            }
          })
          .catch(err => {
            console.warn("No se encontró el usuario:", err);
            passwordInput.disabled = true;
            window.location.href = "/ingreso_manual.html";
          });
      } else {
          alert("Correo inválido. Por favor ingresa un correo válido.");
      }
  }

  passwordInput.addEventListener("input", async () => {
    const password = passwordInput.value.trim();
    if ( password.length === 0 ) {
      botonIngresar.disabled = true;
      botonIngresar.classList.remove('enabled');
    } else {
      botonIngresar.disabled = false;
      botonIngresar.classList.add('enabled');
    }
  });

  correoManual.addEventListener("input", async () => {
    const correo = correoManual.value.trim().toLowerCase();
    try {
      correo_match = correo.match(regex);
      if (!regex.test(correo) || !Array.isArray(correo_match) || correo !== correo_match[0]) {
        advertencia.style.display = 'none';
        passwordContainer.style.display = 'none';
        botonIngresar.disabled = true;
        botonIngresar.classList.remove('enabled');
        passwordInput.disabled = true;
        return;
      }
      console.log("Es formato válido de Correo");

      if (correo.endsWith('@gmail.com')) {
        advertencia.style.display = 'block';
        return;
      }
    } catch (err) {
        console.error('Error al verificar correo:', err);
    }
    // Consulta al backend para verificar si el correo existe y tiene password
    try {
      console.log("Consultando si existe Correo: ", correo);
      const res = await fetch(`/manualUser?email=${encodeURIComponent(correo)}`);
      const data = await res.json();

      if (data.password !== undefined && data.password) {
        passwordContainer.style.display = 'block';
        passwordInput.disabled = false;
        botonIngresar.disabled = true;
        botonIngresar.classList.remove('enabled');
        //requierePassword = true;
      } else {
        botonIngresar.disabled = false;
        botonIngresar.classList.add('enabled');
      }
    } catch (err) {
      advertencia.style.display = 'none';
      passwordContainer.style.display = 'none';
      passwordInput.disabled = true;
      botonIngresar.disabled = false;
      botonIngresar.classList.remove('enabled');
      console.error('Error al verificar correo:', err);
    }  
  });

function mostrarTiempoBloqueo(bloqueadoHasta) {
  const ahora = Date.now();
  const restante = bloqueadoHasta - ahora;

  if (restante > 0) {
    const minutos = Math.floor(restante / 60000);
    const segundos = Math.floor((restante % 60000) / 1000);
    alert(`Cuenta bloqueada. Intenta en ${minutos}m ${segundos}s`);
  }
}
