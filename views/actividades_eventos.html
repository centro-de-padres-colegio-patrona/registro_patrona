<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/styles.css">

  <style>
body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }
    /* CORRECCIÓN: Convertimos el enlace en el contenedor de ancho completo */
    .actividad-link {
      display: block; /* Ocupa todo el ancho */
      width: 100%;
      background: #fff;
      margin: 100px 0 20px 0; 
      padding: 20px;
      box-sizing: border-box; 
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
      text-align: left; 
      text-decoration: none; /* Quita el subrayado azul típico de los enlaces */
      color: inherit; /* Mantiene el color del texto original */
      cursor: pointer; /* Fuerza a que aparezca la mano del cursor en toda la franja */
    }
    .actividad-link h2 {
      color: #b22222;
      margin: 0; /* Limpiamos márgenes para evitar saltos extra */
    }
    .actividad-link video {
      width: 100%;
      border-radius: 6px;
      margin-top: 15px;
      margin-bottom: 15px;
    }
    .actividad-link p {
      line-height: 1.6;
      color: #333;
    }
  </style>

</head>
<body>
<script>
  const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);

</script>
