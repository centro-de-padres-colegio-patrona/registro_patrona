<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles.css">
  <title>Registro CPA: Mis Entradas</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f6f9;
      color: #333;
    }
    .container {
      max-width: 1100px;
      margin: 100px auto 30px auto; 
      padding: 0 20px;
    }
    .header-seccion {
      background-color: #ffffff;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      border-left: 5px solid #b22222;
    }
    .header-seccion h2 {
      margin-top: 0;
      color: #b22222;
    }
    .grid-entradas {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .card-entrada {
      background-color: #ffffff;
      border-radius: 10px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border: 1px solid #e1e4e8;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .badge-tipo {
      align-self: flex-start;
      font-size: 0.75rem;
      font-weight: bold;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
    .badge-estudiante { background-color: #e3f2fd; color: #1565c0; }
    .badge-apoderado { background-color: #e8f5e9; color: #2e7d32; }
    .badge-invitado { background-color: #fff3e0; color: #e65100; }

    .card-nombre {
      font-size: 1.15rem;
      font-weight: bold;
      color: #222;
      margin-bottom: 12px;
    }
    .card-detalles {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.5;
    }
    .label {
      font-weight: bold;
      color: #777;
    }
    .card-footer {
      margin-top: 15px;
      padding-top: 12px;
      border-top: 1px dashed #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #888;
    }
    .folio-tag { font-weight: bold; color: #b22222; }
    .estado-tag { font-weight: bold; text-transform: capitalize; }
    .estado-activa { color: #2e7d32; }
    .estado-usada { color: #c62828; }

    .mensaje-info {
      text-align: center;
      padding: 40px;
      background: #ffffff;
      border-radius: 8px;
      font-size: 1rem;
      color: #666;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
  </style>
</head>
<body>

  <div id="barra-superior">
    Mis Invitaciones Disponibles
  </div>

  <div class="container">
    <div class="header-seccion">
      <h2 id="titulo-evento">Mis Entradas</h2>
      <p>Entradas activas asociadas a tu grupo familiar para esta actividad.</p>
    </div>

    <div id="contenedor-entradas" class="mensaje-info">
      Cargando entradas...
    </div>
  </div>

  <script>
    let userEmail = null;
    let nombres_hijos = null;

    // Función de inicialización
    async function init() {
        userEmail = await getUserEmail();
        console.log(`user email cargado: ${userEmail}`);
    }

    async function getApiKey() {
        try {
            const config_response = await fetch('/api/config');
            if (!config_response.ok) 
                return null;
            const data = await config_response.json();
            if (data && data.apiKey)
                return data.apiKey;
            return null;
        } catch (error) {
            console.error('Unexpected Error: ', error);
        }
        return null;
    }

    async function getUserEmail() {
        try {
          // 1. Intentar obtener de los parámetros de la URL
          const urlParams = new URLSearchParams(window.parent.location.search);
          let user_email = urlParams.get('user_email');
          //console.log(`user_email: ${user_email}`);

          // Si viene en la URL y no está vacío, lo retornamos inmediatamente
          if (user_email && user_email.trim() !== '') {
              return user_email;
          }

          //console.log('Fetching to user');
          // 2. Si no venía en la URL, consultamos a la API esperando la respuesta con await
          const response = await fetch('/api/user');
          
          if (!response.ok) {
              console.error('Usuario no autenticado');
              return null;
          }

          const user = await response.json();
          //console.log('user: ', user.user)
          if (user && user.user) {
              const currentUser = user.user;
              user_email = currentUser.email && currentUser.email.trim() !== "" 
              ? currentUser.email 
              : null;
              //console.log(`User mail: ${user_email}, hijos: `, currentUser.hijos);
              if (currentUser) {
                  nombres_hijos = currentUser.hijos;
              }
              console.log(`[/api/user] correo: ${user_email}, nombres_hijos: `, nombres_hijos);
              return user_email;
          }
        } catch (err) {
        console.error('unexpected error: ', err);
        }

        return null;
    }
   
    const ORDEN_TIPOS = {
      'estudiante': 1,
      'apoderado': 2,
      'invitado': 3
    };

    /**
     * Obtiene el valor de un parámetro de la URL por su nombre
     */
    function getParametroURL(nombre) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(nombre);
    }

    async function cargarEntradasUsuario() {
      // Ejecutar inicialización al cargar el script
      await init();

      const contenedor = document.getElementById('contenedor-entradas');
      const tituloHeader = document.getElementById('titulo-evento');
      
      // 1. Obtener el id_evento de la URL
      const id_evento = getParametroURL('id_evento');
      const id_organizacion='cpa_patrona';

      if (id_evento) {
        // Formatear un título amigable sustituyendo guiones por espacios
        const tituloFormateado = id_evento.replace(/_/g, ' ').toUpperCase();
        tituloHeader.textContent = `Entradas: ${tituloFormateado}`;
      }

      try {
        const apiKey = await getApiKey();
        //const familia = localStorage.getItem('familia') || '';

        // 2. Construir la consulta a la API incorporando el id_evento
        //const params = new URLSearchParams();
        //if (familia) params.append('familia', familia);
        //if (id_evento) params.append('id_evento', idEvento);

        console.log(`fetching to /api/entrada/familia?nombre_completo=${encodeURIComponent(nombres_hijos[0].nombre)}`);
        //const response = await fetch(`/api/entrada/familia?${params.toString()}`, {
        const response = await fetch(`/api/entrada/familia?id_organizacion=${encodeURIComponent(id_organizacion)}&id_evento=${encodeURIComponent(id_evento)}&nombre_completo=${encodeURIComponent(nombres_hijos[0].nombre)}&id_evento=${encodeURIComponent(id_evento)}`, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey
          }
        });

        if (!response.ok) {
          throw new Error('No se pudieron obtener las entradas.');
        }

        let entradas = await response.json();

        console.log('Entradas encontradas: ', entradas.length);
        // 3. Si la API devolviera todas las entradas del usuario, filtramos adicionalmente en el cliente
        /*if (idEvento && Array.isArray(entradas)) {
          entradas = entradas.filter(e => !e.id_evento || e.id_evento === idEvento);
        }*/

        if (!Array.isArray(entradas) || entradas.length === 0) {
          contenedor.className = 'mensaje-info';
          contenedor.innerHTML = '<p>No se encontraron entradas disponibles para esta actividad.</p>';
          return;
        }

        // 4. Ordenamiento por tipo ('estudiante' > 'apoderado' > 'invitado') y luego por nombre
        entradas.sort((a, b) => {
          const tipoA = (a.tipo || '').toLowerCase();
          const tipoB = (b.tipo || '').toLowerCase();

          const ordenA = ORDEN_TIPOS[tipoA] || 99;
          const ordenB = ORDEN_TIPOS[tipoB] || 99;

          if (ordenA !== ordenB) return ordenA - ordenB;

          const nombreA = (a.nombre_completo || '').toLowerCase();
          const nombreB = (b.nombre_completo || '').toLowerCase();
          return nombreA.localeCompare(nombreB);
        });

        // 5. Generar y desplegar las tarjetas
        contenedor.className = 'grid-entradas';
        contenedor.innerHTML = entradas.map(entrada => {
          const tipo = (entrada.tipo || 'invitado').toLowerCase();
          const badgeClass = `badge-${tipo}`;
          const estado = entrada.usado ? 'usada' : (entrada.estado || 'activa');
          const estadoClass = entrada.usado ? 'estado-usada' : 'estado-activa';

          return `
            <div class="card-entrada">
              <div>
                <span class="badge-tipo ${badgeClass}">${entrada.tipo || 'Entrada'}</span>
                <div class="card-nombre">${entrada.nombre_completo || 'Sin nombre'}</div>
                <div class="card-detalles">
                  <div><span class="label">Jornada:</span> ${entrada.jornada || '—'}</div>
                  <div><span class="label">Bloques:</span> ${entrada.bloques || '—'}</div>
                  <div><span class="label">Curso:</span> ${entrada.curso || '—'}</div>
                </div>
              </div>
              <div class="card-footer">
                <span class="folio-tag">Folio: #${String(entrada.folio || 0).padStart(4, '0')}</span>
                <span class="estado-tag ${estadoClass}">${estado}</span>
              </div>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error('Error al cargar entradas:', error);
        contenedor.className = 'mensaje-info';
        contenedor.innerHTML = '<p>Ocurrió un error al cargar las entradas de la actividad.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', cargarEntradasUsuario);
  </script>
</body>
</html>
