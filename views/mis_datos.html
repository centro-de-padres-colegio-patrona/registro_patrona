  <script>  
    document.addEventListener('DOMContentLoaded', () => {
      const childrenSection = document.getElementById('children-section');
      const parentSection = document.getElementById('parent-section');

      parentSection.addEventListener('change', (e) => {
        const target = e.target;
        if (target.classList.contains('usuario-cuenta-check')) {
          const parentForm = target.closest('.parent-form');
          //const checkbox = parentForm.querySelectorAll("select[name='account_owner[]']");
          //const emailInput = parentForm.querySelectorAll("select[name='parentEmail[]']");
          const emailInput = parentForm.querySelector("input[name='parentEmail[]']");
          /*console.log('Checkbox cambiado:', {
            checked: target.checked,
            emailInputExists: !!emailInput,
            emailInput2Exists: !!emailInput2,
            currentUserEmail: currentUser ? currentUser.email : null
          });*/

          if (target.checked) {
            // Deseleccionar los demás
            /*parentSection.querySelectorAll('.usuario-cuenta-check').forEach(cb => {
              if (cb !== target) cb.checked = false;
            });*/
            Array.from(document.querySelectorAll(".parent-form")).map(parent => {
              const cb = parent.querySelector("input[name='account_owner[]']");
              if (cb && cb !== target && cb.checked) {
                cb.checked = false;
                email = parent.querySelector("input[name='parentEmail[]']");
                console.log('Deseleccionando checkbox y limpiando correo:', {
                  emailExists: !!email,
                  emailValue: email ? email.value : null,
                  currentUserEmail: currentUser ? currentUser.email : null
                });
                if (email && email.value === currentUser.email) {
                  email.value = '';
                }
              } 
            });

            /*console.log('Checkbox marcado, copiando correo:', {
              currentUserEmail: currentUser ? currentUser.email : null,
              emailInputValue: emailInput ? emailInput : null,
              emailInput2Value: emailInput2 ? emailInput2.value : null
            });*/
            // Copiar el correo al campo respectivo
            if (currentUser && currentUser.email && emailInput && emailInput.value !== currentUser.email) {
              emailInput.value = currentUser.email || '';
              //emailInput.classList.add('highlight-input'); // Opcional: resaltar el campo
            }
          } else {
            // Si se desmarca, opcionalmente podrías limpiar el campo
            if (currentUser && emailInput && emailInput.value === currentUser.email) {
              emailInput.value = '';
              emailInput.classList.remove('highlight-input'); // Quitar resaltado
            }
          }
        }
      });

      childrenSection.addEventListener('change', (e) => {
        const target = e.target;

        if (target.name === 'childCourse[]' || target.name === 'childSeccion[]') {
          const childForm = target.closest('.child-form');
          const curso = childForm.querySelector("select[name='childCourse[]']").value;
          const seccion = childForm.querySelector("select[name='childSeccion[]']").value;
          const nombreSelect = childForm.querySelector("select[name='childName[]']");
          //const bloque = childForm.querySelector("input[name='childBloque[]']");

          if (curso && seccion) {
            fetch(`/api/alumnos?curso=${encodeURIComponent(curso)}&seccion=${encodeURIComponent(seccion)}`)
              .then(res => res.json())
              .then(async alumnos => {
                nombreSelect.innerHTML = '<option value="">Seleccione</option>';
                alumnos.forEach(nombre => {
                  const option = document.createElement('option');
                  option.value = nombre;
                  option.textContent = nombre;
                  nombreSelect.appendChild(option);
                });
              })
              .catch(err => console.error('Error al obtener nombres:', err));
          }
        } else if (target.name === 'childName[]') {
          try {
            const name_value = target.value;
            const childForm = target.closest('.child-form');
            const curso = childForm.querySelector("select[name='childCourse[]']").value;
            const seccion = childForm.querySelector("select[name='childSeccion[]']").value;
          } catch (error) {
            console.error(`[childName[] handler] Error al actualizar entradas: ${error.message}`, {
              targetName: target.name,
              stack: error.stack
            });
          }
        }
      });
    });
  </script>

  <script>
    /// ----------------------- Verificar Máximo Entradas
    function verificarCursos() {
      const selects = document.querySelectorAll('select[name="childCourse[]"]');
      let contieneIVMedio = false;

      selects.forEach(select => {
        if (select.value === "IV° Medio") {
          contieneIVMedio = true;
        }
      });

      return contieneIVMedio ? 6 : 2;
    }

    // Escucha cambios en todos los selects
    document.querySelectorAll('select[name="childCourse[]"]').forEach(select => {
      select.addEventListener('change', () => {
        const resultado = verificarCursos();
        console.log("Maximo Invitados:", resultado);
        max_invitados = resultado;
        // Aquí puedes usar el resultado como necesites
      });
    });


    function addChild() {
      const section = document.getElementById('children-section');
      const clone = section.querySelector('.child-form').cloneNode(true);
      section.appendChild(clone);
    }

    function addParent() {
      const section = document.getElementById('parent-section');
      const form = section.querySelector('.parent-form');
      const button = document.querySelector("button[onclick='addParent()']");

      console.log('form.length: ', form.length);

      if (form.length >= 2) {
        button.disabled = true;
        button.textContent = 'Máximo alcanzado';
        return;
      }

      const clone = form.cloneNode(true);

      // Limpia los campos del nuevo formulario
      clone.querySelectorAll('input').forEach(input => input.value = '');
      clone.querySelector("select[name='relationship[]']").value = '';

      section.appendChild(clone);

      // Desactiva si ya se llegó al máximo
      if (section.querySelectorAll('.parent-form').length >= 2) {
        button.disabled = true;
        button.textContent = 'Máximo alcanzado';
      }
    }

    function deshabilitarControles(form) {
      const elementos = form.querySelectorAll('input, select, textarea, button');
      elementos.forEach(el => el.disabled = true);
    }

    function fillChildrenSection(user) {
      const hijos = user.hijos || [];
      const section = document.getElementById('children-section');

      // Elimina formularios existentes excepto el primero
      const baseForm = section.querySelector('.child-form');
      section.querySelectorAll('.child-form').forEach((form, index) => {
        if (index > 0) form.remove();
      });

      if (hijos.length === 0) {
        return;
      }

      hijos.forEach(async (hijo, index) => {
        // Clona si no es el primero
        const form = index === 0 ? baseForm : baseForm.cloneNode(true);
        if (index > 0) section.appendChild(form);

        // Asigna valores
        form.querySelector("select[name='childCourse[]']").value = hijo.curso;
        form.querySelector("select[name='childSeccion[]']").value = hijo.seccion;

        // Simula llamada a API para cargar nombres válidos
        if (hijo.curso && hijo.seccion) {
          fetch(`/api/alumnos?curso=${encodeURIComponent(hijo.curso)}&seccion=${encodeURIComponent(hijo.seccion)}`)
            .then(res => res.json())
            .then(alumnos => {
              const nombreSelect = form.querySelector("select[name='childName[]']");
              nombreSelect.innerHTML = '<option value="">Seleccione</option>';
              alumnos.forEach(nombre => {
                const option = document.createElement('option');
                option.value = nombre;
                option.textContent = nombre;
                nombreSelect.appendChild(option);
              });

              // Selecciona el nombre si está en la lista
              nombreSelect.value = hijo.nombre;
            })
            .catch(err => console.error('Error al cargar nombres:', err));
        }
        const nombreSelect = form.querySelector("select[name='childName[]']");
        nombreSelect.innerHTML = '<option value="">Seleccione</option>';
        const option = document.createElement('option');
        option.value = hijo.nombre;
        option.textContent = hijo.nombre;
        nombreSelect.appendChild(option);
        nombreSelect.value = hijo.nombre;

        if (hijo.nombre && hijo.curso && hijo.seccion) {
          form.querySelector("select[name='childCourse[]']").disabled = true;
          form.querySelector("select[name='childSeccion[]']").disabled = true;
        }
      });
    }

    function fillParentSection(currentUser) {
      const padres = currentUser.padres || [];
      const section = document.getElementById('parent-section');
      const baseForm = section.querySelector('.parent-form');

      // Elimina formularios extra si ya hay más de uno
      section.querySelectorAll('.parent-form').forEach((form, index) => {
        if (index > 0) form.remove();
      });

      padres.forEach((padre, index) => {
        const form = index === 0 ? baseForm : baseForm.cloneNode(true);
        if (index > 0) section.appendChild(form);

        form.querySelector("input[name='parentSurname[]']").value = padre.apellido || '';
        form.querySelector("input[name='parentName[]']").value = padre.nombre || '';
        form.querySelector("input[name='parentEmail[]']").value = padre.correo || '';
        form.querySelector("input[name='parentPhone[]']").value = padre.telefono || '';
        form.querySelector("select[name='relationship[]']").value = padre.parentesco || '';
        form.querySelector("input[name='account_owner[]']").checked = padre.es_usuario_cuenta || false;
      });
    }


    function fillUserInfo(user) {
      fillChildrenSection(user);
      fillParentSection(user);
    }


    function crearLoginBox(jornadaNombre, valores = {}) {
      const original = document.querySelector('.login-box');
      const clon = original.cloneNode(true);
      const index = document.querySelectorAll('.login-box').length + 1;
      const nuevoId = `login-box-${index}`;
      clon.id = nuevoId;

      // Actualiza el label
      const jornadaLabel = clon.querySelector('#jornadaLabel');
      if (jornadaLabel) {
        jornadaLabel.textContent = `Jornada ${jornadaNombre}`;
      }

      // Actualiza los inputs con IDs únicos y valores personalizados
      clon.querySelectorAll('input').forEach((input, i) => {
        const baseName = input.name || input.id || `input-${i}`;
        const uniqueName = `${baseName}-${index}`;
        input.name = uniqueName;
        input.id = uniqueName;
        input.value = valores[baseName] || '';
      });

      // Inserta el clon
      original.parentNode.appendChild(clon);
    }

    function actualizarInput(clonId, inputBaseName, nuevoValor) {
      const input = document.querySelector(`#${clonId} input[name="${inputBaseName}-${clonId.split('-').pop()}"]`);
      if (input) {
        input.value = nuevoValor;
      }
    }

    function retrieve_cursos() {
      return retrieve_hijos()
    }
    function retrieve_hijos() {
      // Recopila hijos
      const hijos = Array.from(document.querySelectorAll(".child-form")).map(child => ({
        nombre: child.querySelector("select[name='childName[]']").value,
        curso: child.querySelector("select[name='childCourse[]']").value,
        seccion: child.querySelector("select[name='childSeccion[]']").value
      }));
      return hijos;
    }

    function retrieve_parents() {
      // Recopila padres
      try {
      const padres = Array.from(document.querySelectorAll(".parent-form")).map(parent => ({
        apellido: parent.querySelector("input[name='parentSurname[]']").value,
        correo: parent.querySelector("input[name='parentEmail[]']").value,
        telefono: parent.querySelector("input[name='parentPhone[]']").value,
        parentesco: parent.querySelector("select[name='relationship[]']").value,
        nombre: parent.querySelector("input[name='parentSurname[]']").value + ' ' + parent.querySelector("input[name='parentName[]']").value,
        es_usuario_cuenta: parent.querySelector("input[name='account_owner[]']") ? parent.querySelector("input[name='account_owner[]']").checked : false
      }));
      return padres;
    } catch (error) {
      return [];
    }
    }


    document.getElementById('registro-form').addEventListener('submit', function(e) {
      e.preventDefault();

      // Recopila hijos
      const hijos = Array.from(document.querySelectorAll(".child-form")).map(child => ({
        nombre: child.querySelector("select[name='childName[]']").value,
        curso: child.querySelector("select[name='childCourse[]']").value,
        seccion: child.querySelector("select[name='childSeccion[]']").value
      }));

      // Recopila padres
      const padres = Array.from(document.querySelectorAll(".parent-form")).map(parent => ({
        nombre: parent.querySelector("input[name='parentName[]']").value,
        apellido: parent.querySelector("input[name='parentSurname[]']").value,
        correo: parent.querySelector("input[name='parentEmail[]']").value,
        telefono: parent.querySelector("input[name='parentPhone[]']").value,
        parentesco: parent.querySelector("select[name='relationship[]']").value,
        es_usuario_cuenta: parent.querySelector("input[name='account_owner[]']") ? parent.querySelector("input[name='account_owner[]']").checked : false
      }));


            fetch('/api/registro', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              //body: JSON.stringify({...currentUser, hijos, padres, invitados, correoEntradas, estado_pago})
              body: JSON.stringify({...currentUser, hijos, padres})
            })
            .then(res => res.json())
            .then(response => {
              //window.location.href = "register_success";
              console.debug('Datos del usuario guardados ')
            })
            .catch(error => {
              console.error('Error al registrar:', error);
            });
          });

    document.addEventListener('change', function(e) {
        if (e.target.classList.contains('account_owner')) {
            const checkboxes = document.querySelectorAll('.account_owner');
            const currentIndex = e.target.getAttribute('data-index');
            const emailInput = document.getElementById(`email_apoderado_${currentIndex}`);

            console.log('Checkbox cambiado:', {
                checked: e.target.checked,
                currentIndex,
                emailInputExists: !!emailInput,
                currentUserEmail: currentUser ? currentUser.email : null
            });
            if (e.target.checked) {
                // 1. Deseleccionar los demás
                checkboxes.forEach(cb => {
                    if (cb !== e.target) cb.checked = false;
                });

                // 2. Copiar el correo al campo respectivo
                if (emailInput) {
                    emailInput.value = currentUser.email || '';
                    emailInput.classList.add('highlight-input'); // Opcional: resaltar el campo
                }
            } else {
                // Si se desmarca, opcionalmente podrías limpiar el campo
                if (emailInput && emailInput.value === currentUser.email) {
                    emailInput.value = '';
                    emailInput.classList.remove('highlight-input'); // Quitar resaltado
                }
            }
        }
    });          

  </script>
