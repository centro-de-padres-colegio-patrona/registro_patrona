<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro CPA: Panel de Usuario</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
  <link rel="shortcut icon" type="image/x-icon" href="img/favicon.ico" />
  <link rel="manifest" href="img/site.webmanifest">
  <style>
    /* ─── Desktop ─── */
    #usuario-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 10px 8px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.15);
    }

    #usuario-nombre {
      font-size: 0.95rem;
      font-weight: 700;
      color: white;
      text-align: center;
      line-height: 1.3;
    }

    #usuario-correo {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.65);
      text-align: center;
      word-break: break-all;
    }

    /* ─── Mobile Top Bar (hidden on desktop) ─── */
    #mobile-topbar {
      display: none;
    }

    #mobile-content {
      display: none;
    }

    /* ─── Mobile Layout ─── */
    @media screen and (max-width: 768px) {
      #sidebar {
        display: none !important;
      }

      #content {
        display: none !important;
      }

      body.panel-usuario {
        margin: 0 !important;
        padding: 0 !important;
        overflow-x: hidden;
      }

      #mobile-topbar {
        display: block !important;
        background: #2c3e50;
        position: sticky;
        top: 0;
        z-index: 100;
        padding: 0;
      }

      .topbar-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
      }

      .topbar-user {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .topbar-user .name {
        font-size: 0.88rem;
        font-weight: 700;
        color: white;
      }

      .topbar-user .email {
        font-size: 0.68rem;
        color: rgba(255,255,255,0.55);
      }

      .topbar-user .role {
        font-size: 0.65rem;
        color: rgba(255,255,255,0.4);
      }

      .btn-salir-mobile {
        background: transparent;
        border: 1.5px solid rgba(255,255,255,0.4);
        color: white;
        padding: 6px 14px;
        border-radius: 6px;
        font-size: 0.8rem;
        font-weight: 600;
        cursor: pointer;
      }

      /* Content area */
      #mobile-content {
        display: block !important;
      }

      #mobile-content iframe {
        width: 100%;
        height: calc(100vh - 52px);
        border: none;
        display: block;
      }
    }
  </style>
</head>
<body class="panel-usuario">

<script>
  const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
  document.body.classList.add(isMobile ? 'mobile' : 'desktop');
</script>

  <!-- ─── Mobile Top Bar ─── -->
  <div id="mobile-topbar">
    <div style="display:flex; align-items:center; justify-content:space-between; background:#2c3e50; padding:8px 12px;">
      <!-- Hamburger button -->
      <button id="hamburger-btn" onclick="toggleMobileMenu()" style="flex-shrink:0; background:transparent; border:none; padding:8px; cursor:pointer; display:flex; flex-direction:column; gap:4px;">
        <span style="display:block; width:22px; height:3px; background:white; border-radius:2px;"></span>
        <span style="display:block; width:22px; height:3px; background:white; border-radius:2px;"></span>
        <span style="display:block; width:22px; height:3px; background:white; border-radius:2px;"></span>
      </button>
      <div style="display:flex; flex-direction:column; flex:1; margin-left:12px;">
        <span style="font-size:0.85rem; font-weight:700; color:white;" id="mobile-nombre">cargando...</span>
        <span style="font-size:0.65rem; color:rgba(255,255,255,0.55);" id="mobile-correo"></span>
        <span style="font-size:0.6rem; color:rgba(255,255,255,0.4);" id="mobile-rol"></span>
      </div>
      <button onclick="logout()" style="flex-shrink:0; background:transparent; border:1.5px solid rgba(255,255,255,0.4); color:white; padding:6px 14px; border-radius:6px; font-size:0.8rem; font-weight:600; cursor:pointer;">Salir</button>
    </div>
  </div>

  <!-- ─── Mobile Slide Menu (overlay) ─── -->
  <div id="mobile-menu-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:999;" onclick="closeMobileMenu()"></div>
  <div id="mobile-menu-panel" style="position:fixed; top:0; left:-280px; width:280px; height:100%; background:white; z-index:1000; transition:left 0.3s ease; overflow-y:auto; box-shadow:2px 0 10px rgba(0,0,0,0.3);">
    <!-- Close button -->
    <div style="display:flex; justify-content:flex-end; padding:12px 16px;">
      <button onclick="closeMobileMenu()" style="background:transparent; border:none; font-size:1.8rem; color:#333; cursor:pointer; line-height:1;">&times;</button>
    </div>
    <!-- Logo -->
    <div style="text-align:center; padding:0 20px 20px;">
      <img src="./img/logo.png" alt="Logo" style="width:120px; height:auto;">
    </div>
    <!-- Menu items -->
    <div id="mobile-menu-items" style="padding:0 20px;"></div>
    <!-- Salir button -->
    <div style="padding:20px; margin-top:20px;">
      <button onclick="logout()" style="width:100%; padding:12px; background:#2c3e50; color:white; border:none; border-radius:8px; font-size:0.95rem; font-weight:600; cursor:pointer;">Salir</button>
    </div>
  </div>

  <!-- Hidden tabs container (used by JS logic) -->
  <div id="mobile-tabs" style="display:none;"></div>

  <!-- Mobile Content -->
  <div id="mobile-content">
    <iframe id="mobile-visor" src="about:blank"></iframe>
  </div>

  <!-- ─── Desktop Sidebar ─── -->
  <div id="sidebar">
    <img src="./img/logo.png" alt="Logo" class="logo">
    <div id="usuario-info">
      <span id="usuario-nombre">cargando...</span>
      <span id="usuario-correo"></span>
      <span id="usuario-rol" style="font-size:0.7rem; color:rgba(255,255,255,0.5); margin-top:2px;"></span>
    </div>
    <div id="menu-container"></div>
    <button onclick="logout()" style="margin-top:auto;">Salir</button>
  </div>

  <!-- Desktop Content -->
  <div id="content">
    <iframe id="visor" src="about:blank"></iframe>
  </div>

  <script>
    function cargarContenido(url, botonPresionado) {
      // Agregar user_email al URL si es login manual
      const urlParams = new URLSearchParams(window.location.search);
      const emailFromUrl = urlParams.get('user_email');
      let fullUrl = url;
      if (emailFromUrl && !url.includes('user_email')) {
        fullUrl = url + (url.includes('?') ? '&' : '?') + 'user_email=' + encodeURIComponent(emailFromUrl);
      }

      // Desktop
      const visor = document.getElementById('visor');
      if (visor) {
        if (!visor.src.endsWith(fullUrl)) visor.src = fullUrl;
      }

      // Mobile
      const mobileVisor = document.getElementById('mobile-visor');
      if (mobileVisor) {
        if (!mobileVisor.src.endsWith(fullUrl)) mobileVisor.src = fullUrl;
      }

      // Desktop buttons
      const botones = document.querySelectorAll('#menu-container button');
      botones.forEach(boton => boton.classList.remove('activo'));
      if (botonPresionado) botonPresionado.classList.add('activo');

      // Mobile menu items
      const mobileItems = document.querySelectorAll('#mobile-menu-items button');
      mobileItems.forEach(item => item.classList.remove('mobile-menu-activo'));
      if (botonPresionado && botonPresionado.closest('#mobile-menu-items')) {
        botonPresionado.classList.add('mobile-menu-activo');
      }

      // Close mobile menu after selection
      closeMobileMenu();
    }

    function toggleMobileMenu() {
      const panel = document.getElementById('mobile-menu-panel');
      const overlay = document.getElementById('mobile-menu-overlay');
      panel.style.left = '0';
      overlay.style.display = 'block';
      document.body.style.overflow = 'hidden';
    }

    function closeMobileMenu() {
      const panel = document.getElementById('mobile-menu-panel');
      const overlay = document.getElementById('mobile-menu-overlay');
      panel.style.left = '-280px';
      overlay.style.display = 'none';
      document.body.style.overflow = '';
    }

    function logout() {
      try {
        sessionStorage.clear();
        localStorage.clear();
        window.location.href = '/logout';
      } catch (err) {
        console.error('Error al cerrar sesión:', err);
        window.location.href = '/';
      }
    }

    // Definición de menús por rol
    const menusPorRol = {
      administrador: [
        { label: '📋 Mis datos', url: 'mis_datos.html' },
        { label: '💰 Mis Pagos al CPA', url: 'pagos_cpa.html' },
        { label: '📄 Mis Documentos de Matrícula', url: 'documentos_matricula.html' },
        { label: '🎉 Actividades y Eventos', url: 'actividades_eventos.html' },
        { label: '🎟 Probar Ticket', url: 'test_ticket.html' },
        { label: '🔍 Validar QR', url: 'validar_qr.html' },
        { label: '📋 Buscar Entradas', url: 'buscar_entradas.html' },
        { label: '---', url: '' },
        { label: '::Mantenedores', url: '' },
        { label: '👤 Perfiles', url: 'mantenedores.html' },
        { label: '👨‍👩‍👧 Apoderados', url: 'apoderados.html' },
        { label: '📚 Cursos/Bloque', url: 'cursos_bloque.html' },
      ],
      apoderado: [
        { label: '📋 Mis datos', url: 'mis_datos.html' },
        { label: '💰 Mis Pagos al CPA', url: 'pagos_cpa.html' },
        { label: '📄 Mis Documentos de Matrícula', url: 'documentos_matricula.html' },
        { label: '🎉 Actividades y Eventos', url: 'actividades_eventos.html' },
      ],
      validador: [
        { label: '🔍 Validar QR', url: 'validar_qr.html' },
        { label: '📋 Mis datos', url: 'mis_datos.html' },
      ],
      supervisor: [
        { label: '📋 Buscar Entradas', url: 'buscar_entradas.html' },
        { label: '🔍 Validar QR', url: 'validar_qr.html' },
        { label: '📋 Mis datos', url: 'mis_datos.html' },
      ],
    };

    function construirMenu(rol) {
      // Desktop sidebar
      const container = document.getElementById('menu-container');
      container.innerHTML = '';
      const menus = menusPorRol[rol] || menusPorRol['apoderado'];
      console.log('Menus a construir:', menus.length, JSON.stringify(menus));
      for (let i = 0; i < menus.length; i++) {
        const item = menus[i];
        if (item.label === '---') {
          const hr = document.createElement('hr');
          hr.style.cssText = 'border:none; border-top:1px solid rgba(255,255,255,0.15); margin:8px 10px;';
          container.appendChild(hr);
          continue;
        }
        if (item.label.startsWith('::')) {
          const title = document.createElement('span');
          title.textContent = item.label.slice(2);
          title.style.cssText = 'display:block; padding:4px 10px; font-size:0.7rem; font-weight:700; color:rgba(255,255,255,0.4); text-transform:uppercase; letter-spacing:0.5px;';
          container.appendChild(title);
          continue;
        }
        const btn = document.createElement('button');
        btn.textContent = item.label;
        btn.setAttribute('data-url', item.url);
        btn.onclick = function() { cargarContenido(item.url, this); };
        container.appendChild(btn);
        console.log('Desktop btn agregado:', item.label);
      }

      // Mobile slide menu items
      const mobileMenuItems = document.getElementById('mobile-menu-items');
      if (mobileMenuItems) {
        mobileMenuItems.innerHTML = '';
        for (let i = 0; i < menus.length; i++) {
          const item = menus[i];
          if (item.label === '---') {
            const hr = document.createElement('hr');
            hr.style.cssText = 'border:none; border-top:1px solid #eee; margin:12px 0;';
            mobileMenuItems.appendChild(hr);
            continue;
          }
          if (item.label.startsWith('::')) {
            const title = document.createElement('span');
            title.textContent = item.label.slice(2);
            title.style.cssText = 'display:block; padding:8px 0 4px; font-size:0.72rem; font-weight:700; color:#999; text-transform:uppercase; letter-spacing:0.5px;';
            mobileMenuItems.appendChild(title);
            continue;
          }
          const btn = document.createElement('button');
          btn.textContent = item.label;
          btn.setAttribute('data-url', item.url);
          btn.style.cssText = 'display:block; width:100%; text-align:left; padding:14px 12px; margin-bottom:4px; background:transparent; border:none; border-radius:8px; font-size:0.95rem; color:#333; cursor:pointer; transition:background 0.2s;';
          btn.onmouseenter = function() { this.style.background = '#f0f0f0'; };
          btn.onmouseleave = function() { if (!this.classList.contains('mobile-menu-activo')) this.style.background = 'transparent'; };
          btn.onclick = function() { cargarContenido(item.url, this); };
          mobileMenuItems.appendChild(btn);
          console.log('Mobile menu btn agregado:', item.label);
        }
      }

      // Hidden mobile tabs (keep for compatibility)
      const mobileTabs = document.getElementById('mobile-tabs');
      if (mobileTabs) {
        mobileTabs.innerHTML = '';
      }
    }

    // Inicialización: obtener usuario y su perfil
    async function inicializarPanel() {
      let correo = '';
      let nombreCompleto = '';

      const urlParams = new URLSearchParams(window.location.search);
      const emailFromUrl = urlParams.get('user_email');

      try {
        const resUser = await fetch('/api/user');
        if (resUser.ok) {
          const data = await resUser.json();
          const user = data.user;
          correo = user?.email || '';
          if (user?.padres && user.padres.length > 0) {
            const p = user.padres.find(pa => pa.es_usuario_cuenta) || user.padres.find(pa => (pa.correo || '').toLowerCase() === correo.toLowerCase());
            if (p) {
              nombreCompleto = `${p.nombre || ''} ${p.apellido || ''}`.trim();
            }
          }
          if (!nombreCompleto) nombreCompleto = data.req?.displayName || user?.displayName || '';
        }
      } catch (err) {
        console.log('Usuario no autenticado por Google, usando URL param');
      }

      if (!correo && emailFromUrl) {
        correo = emailFromUrl;
        try {
          const resManual = await fetch(`/api/manualUser?email=${encodeURIComponent(correo)}`);
          if (resManual.ok) {
            const data = await resManual.json();
            const user = data.user;
            if (user?.padres && user.padres.length > 0) {
              const p = user.padres.find(pa => pa.es_usuario_cuenta) || user.padres.find(pa => (pa.correo || '').toLowerCase() === correo.toLowerCase()) || user.padres[0];
              nombreCompleto = `${p.nombre || ''} ${p.apellido || ''}`.trim();
            }
            if (!nombreCompleto) nombreCompleto = user?.displayName || '';
          }
        } catch (err) {
          console.error('Error obteniendo usuario manual:', err);
        }
      }

      // Actualizar UI con nombre
      document.getElementById('usuario-nombre').textContent = nombreCompleto || 'Usuario';
      document.getElementById('usuario-correo').textContent = correo;
      document.getElementById('mobile-nombre').textContent = nombreCompleto || 'Usuario';
      document.getElementById('mobile-correo').textContent = correo;

      // Obtener perfil/rol
      let rol = 'apoderado';
      let paginaInicio = '';
      if (correo) {
        try {
          const resPerfil = await fetch(`/api/mi-perfil?email=${encodeURIComponent(correo)}`);
          if (resPerfil.ok) {
            const perfil = await resPerfil.json();
            rol = perfil.rol || 'apoderado';
            paginaInicio = perfil.pagina_inicio || '';
          }
        } catch (err) {
          console.error('Error obteniendo perfil:', err);
        }
      }

      const rolDisplay = rol.charAt(0).toUpperCase() + rol.slice(1);
      document.getElementById('usuario-rol').textContent = rolDisplay;
      document.getElementById('mobile-rol').textContent = rolDisplay;
      
      // SIEMPRE construir menú al final
      console.log('Construyendo menú para rol:', rol);
      construirMenu(rol);

      // Determinar página de inicio: usar pagina_inicio del perfil si existe, sino el primer menú del rol
      const menus = menusPorRol[rol] || menusPorRol['apoderado'];
      let paginaCarga = null;
      if (paginaInicio && menus.some(item => item.url === paginaInicio)) {
        paginaCarga = paginaInicio;
      } else {
        const primerMenu = menus.find(item => item.url && !item.label.startsWith('::') && item.label !== '---');
        if (primerMenu) paginaCarga = primerMenu.url;
      }

      if (paginaCarga) {
        // Desktop: cargar iframe y marcar botón activo
        const visor = document.getElementById('visor');
        if (visor) visor.src = paginaCarga;
        const desktopBtns = document.querySelectorAll('#menu-container button');
        for (const btn of desktopBtns) {
          if (btn.getAttribute('data-url') === paginaCarga) {
            btn.classList.add('activo');
            break;
          }
        }
        // Mobile: cargar iframe y marcar menú activo
        const mobileVisor = document.getElementById('mobile-visor');
        if (mobileVisor) mobileVisor.src = paginaCarga;
        const mobileMenuBtns = document.querySelectorAll('#mobile-menu-items button');
        for (const btn of mobileMenuBtns) {
          if (btn.getAttribute('data-url') === paginaCarga) {
            btn.classList.add('mobile-menu-activo');
            btn.style.background = '#e8f4fd';
            break;
          }
        }
      }
    }

    inicializarPanel();
  </script>

</body>
</html>
