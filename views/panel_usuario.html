<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bingo Solidario 2026</title>
  <link rel="stylesheet" href="/styles.css">


</head>
<body class="panel-usuario">

<script>
  const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
  document.body.classList.add(isMobile ? 'mobile' : 'desktop');
</script>

  <!--div id="barra-superior">
    <span id="texto-barra">Bienvenido al Registro CPA Colegio Patrona</span>
  </div-->

  <!-- Controles laterales -->
  <div id="sidebar">
    <img src="./img/logo.png" alt="Logo" class="logo">
    <div id="usuario-info">
      <span id="usuario-correo">Usuario: cargando...</span>
    </div>
    <button onclick="cargarContenido('mis_datos.html', this)">Mis datos</button>
    <button onclick="cargarContenido('entradas_bingo.html', this)">Mis Entradas Bingo</button>
    <button onclick="cargarContenido('pagos_cpa.html', this)">Mis Pagos al CPA</button>
    <button onclick="cargarContenido('documentos_matricula.html', this)">Mis Documentos de Matrícula</button>
  </div>

  <!-- Área de contenido -->
  <div id="content">
    <!--iframe id="visor" src=""></iframe-->
    <iframe id="visor" src="inicio_panel.html"></iframe>
  </div>

  <script>
    function cargarContenido(url, botonPresionado) {
      const visor = document.getElementById('visor');

      // Si ya está mostrando el contenido, no hacer nada
      if (visor.src.endsWith(url)) return;
      
      document.getElementById('visor').src = url;

      // Quitar clase 'activo' de todos los botones
      const botones = document.querySelectorAll('#sidebar button');
      botones.forEach(boton => boton.classList.remove('activo'));

      // Agregar clase 'activo' al botón presionado
      botonPresionado.classList.add('activo');
    }


    fetch('/api/user')
      .then(res => {
        if (!res.ok) throw new Error('Usuario no autenticado');
        return res.json();
      })
      .then(data => {
        const correo = data.user?.email || 'correo no disponible';
        document.getElementById('usuario-correo').textContent =
          `Usuario: ${correo}`;
      })
      .catch(err => {
        console.error('No se pudo obtener el usuario:', err);
        document.getElementById('usuario-correo').textContent =
          'Usuario: no autenticado';
      });

</script>

</body>
</html>
