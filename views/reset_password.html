<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/styles.css">
  <title>Restablecer contraseña</title>


</head>
<body>
<script>
  const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
  document.body.classList.add(isMobile ? 'mobile' : 'desktop');
</script>

  <h2>Restablecer contraseña</h2>
  <form id="resetForm">
    <input type="hidden" id="token" name="token">
    <label for="nuevaPassword">Nueva contraseña:</label>
    <input type="password" id="nuevaPassword" name="nuevaPassword" required>
    <button type="submit">Actualizar</button>
  </form>
  <p id="estado"></p>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    document.getElementById("token").value = token;

    document.getElementById("resetForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const nuevaPassword = document.getElementById("nuevaPassword").value;

      fetch("/api/resetPassword", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ token, nuevaPassword })
      })
      .then(res => res.json())
      .then(data => {
        document.getElementById("estado").textContent = data.mensaje || "Contraseña actualizada";
      })
      .catch(err => {
        document.getElementById("estado").textContent = "Error al actualizar contraseña";
      });
    });
  </script>

</body>
</html>
