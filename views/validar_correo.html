<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="/styles.css">
  <title>Validación Correo</title>


</head>
<body>
<script>
  const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
  document.body.classList.add(isMobile ? 'mobile' : 'desktop');
</script>

  <h2>Validación Correo</h2>

    <div class="login-box">
    <h3>Validación de correo</h3>
    <p>Correo registrado: <strong id="correoMostrado">cargando...</strong></p>

    <button id="enviarCodigoBtn" class="enviar-btn">Enviar código al correo</button>

    <div style="margin-top: 20px;">
        <label for="codigoIngresado">Ingrese el código recibido:</label>
        <input type="text" id="codigoIngresado" maxlength="6" placeholder="Ej: 123456">
        <button id="validarCodigoBtn" class="enviar-btn">Validar</button>
    </div>

    <p id="resultadoValidacion" style="margin-top: 10px; font-weight: bold;"></p>
    </div>

  <form id="registro-form">
  <!-- Sección Reporte -->

  <div id="jornadas-container"></div>

    <br><br>
    <!--button type="submit">Enviar</button-->

  </form>

  <script>
    let codigoGenerado = null;

    // Mostrar el correo del usuario
    fetch('/api/user')
        //.then(res => res.json())
        .then(response => {
          console.log('Respuesta del servidor:', response);
          if (!response.ok) throw new Error('Usuario no autenticado');
          return response.json();
        })
        .then(data => {
        const correo = data.user.email || "ejemplo@correo.com";
        document.getElementById("correoMostrado").textContent = correo;
        })
        .catch(error => {
          console.log('Fue ingresado manual:', error);
          const correoManual = sessionStorage.getItem('correoManual');
          console.log(`Correo manual obtenido de sessionStorage: ${correoManual}`);
          document.getElementById("correoMostrado").textContent = correoManual;
          console.log(`correoManual: ${correoManual}`);
          console.log(`document.getElementById("correoMostrado").textContent: ${document.getElementById("correoMostrado").textContent}`);
        });

    // Generar y enviar código
    document.getElementById("enviarCodigoBtn").addEventListener("click", () => {
        codigoGenerado = Math.floor(100000 + Math.random() * 900000).toString();
        console.log("Código generado:", codigoGenerado);
        email_destinatario = document.getElementById("correoMostrado").textContent;
        // Simular envío al backend
        fetch('/api/enviarCodigo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email_destinatario , codigo: codigoGenerado })
        })
        .then(res => res.json())
        .then(data => {
        alert("Código enviado al correo registrado.");
        })
        .catch(err => {
        console.error("Error al enviar código:", err);
        });
    });

    // Validar código ingresado
    document.getElementById("validarCodigoBtn").addEventListener("click", () => {
        const ingresado = document.getElementById("codigoIngresado").value.trim();
        const resultado = document.getElementById("resultadoValidacion");

        if (ingresado === codigoGenerado) {
            fetch('/api/correo_validado')
                .then(res => res.json())
                .then(data => {
                    //const correo = data.user.email || "ejemplo@correo.com";
                    //document.getElementById("correoMostrado").textContent = correo;
                    resultado.textContent = "✅ Código válido. Correo confirmado.";
                    resultado.style.color = "green";
                    window.location.href = "/entradas_bingo.html";
                })
                .catch(err => {
                    console.error("Error al confirmar correo:", err);
                    if (data.status && data.status === 401) {
                      //resultado.textContent = "❌ Error al validar el correo. Intente nuevamente.";
                      //resultado.style.color = "red";
                      console.log("Redirigiendo a restablecer contraseña.");
                      window.location.href = "/reset_password.html";
                    }
                });
        } else {
            resultado.textContent = "❌ Código incorrecto. Intente nuevamente.";
            resultado.style.color = "red";
        }
    });

  </script>

</body>
</html>
